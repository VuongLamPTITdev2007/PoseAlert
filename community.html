<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PoseAlert — Cộng đồng</title>
  <meta name="description" content="Chat, phòng học nhóm, bạn bè và bảng xếp hạng trên PoseAlert"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/scrollbar.css"/>
  <link rel="stylesheet" href="css/navbar.css"/>
  <link rel="stylesheet" href="css/community.css"/>
</head>
<body class="has-navbar">

  <!-- ========== MODAL TẠO PHÒNG ========== -->
  <div class="modal-overlay hidden" id="modal-create-room">
    <div class="modal-box">
      <div class="modal-title">🏠 Tạo phòng học mới</div>
      <form onsubmit="handleCreateRoom(event)" style="display:flex;flex-direction:column;gap:1rem;">
        <div class="input-group">
          <label for="room-name-input" style="font-size:0.78rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em;">Tên phòng</label>
          <input type="text" id="room-name-input" class="search-input" placeholder="Ví dụ: Ôn thi Toán" required minlength="2" style="margin-bottom:0"/>
        </div>
        <div class="input-group">
          <label for="room-max-input" style="font-size:0.78rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em;">Số người tối đa</label>
          <input type="number" id="room-max-input" class="search-input" value="10" min="2" max="50" style="margin-bottom:0"/>
        </div>
        <div style="display:flex;gap:0.5rem;">
          <button type="submit" class="btn-send" style="flex:1;">✅ Tạo phòng</button>
          <button type="button" class="btn-send" style="flex:0.5;background:var(--bg-card);color:var(--text-secondary);border:1px solid var(--border);" onclick="closeCreateRoomModal()">Hủy</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ========== LAYOUT CHÍNH (Discord-like) ========== -->
  <div class="community-page">

    <!-- ===== SIDEBAR TRÁI: Phòng học + Bạn bè ===== -->
    <div class="sidebar-left" id="sidebar-left">

      <!-- Phòng học -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">📚 Phòng học</div>
        <div class="room-list" id="room-list">
          <div style="color:var(--text-secondary);font-size:0.8rem;padding:0.5rem;">Đang tải...</div>
        </div>
        <button class="btn-create-room" onclick="openCreateRoomModal()">+ Tạo phòng mới</button>
      </div>

      <!-- Bạn bè online -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">👥 Bạn bè</div>
        <div class="member-list" id="friends-list">
          <div style="color:var(--text-secondary);font-size:0.8rem;padding:0.5rem;">Đang tải...</div>
        </div>
      </div>

      <!-- Tìm bạn -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">🔍 Tìm người dùng</div>
        <input type="text" class="search-input" id="user-search-input"
               placeholder="Nhập tên để tìm..." oninput="handleUserSearch(this.value)"/>
        <div class="search-results" id="user-search-results"></div>
      </div>
    </div>

    <!-- ===== VÙNG CHAT CHÍNH ===== -->
    <div class="chat-area" id="chat-area">
      <!-- Welcome state (chưa chọn phòng) -->
      <div class="welcome-chat" id="welcome-chat">
        <div class="welcome-icon">💬</div>
        <h2>Chào mừng đến Cộng đồng PoseAlert!</h2>
        <p>Chọn phòng học bên trái để bắt đầu chat,<br/>hoặc tạo phòng mới để học cùng bạn bè.</p>
      </div>

      <!-- Chat UI (ẩn ban đầu) -->
      <div id="chat-ui" style="display:none;flex-direction:column;height:100%;">
        <div class="chat-header">
          <div>
            <div class="chat-room-name" id="chat-current-room-name">Phòng học</div>
            <div class="chat-room-info" id="chat-current-room-info"></div>
          </div>
          <button class="fr-btn reject" onclick="handleLeaveRoom()" style="font-size:0.8rem;padding:0.4rem 0.8rem;">🚪 Rời phòng</button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-typing" id="chat-typing"></div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="chat-input" placeholder="Nhập tin nhắn..."/>
          <button class="btn-send" id="btn-chat-send">Gửi</button>
        </div>
      </div>
    </div>

    <!-- ===== SIDEBAR PHẢI: Thành viên + Leaderboard ===== -->
    <div class="sidebar-right">

      <!-- Lời mời kết bạn -->
      <div class="sidebar-section" id="friend-requests-section" style="display:none;">
        <div class="sidebar-section-title">📬 Lời mời kết bạn</div>
        <div id="friend-requests-list"></div>
      </div>

      <!-- Thành viên phòng -->
      <div class="sidebar-section" id="room-members-section" style="display:none;">
        <div class="sidebar-section-title">👤 Thành viên phòng</div>
        <div class="member-list" id="room-members-list"></div>
      </div>

      <!-- Bảng xếp hạng -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">🏆 Bảng xếp hạng</div>
        <div class="lb-tabs">
          <button class="lb-tab active" onclick="switchLeaderboardTab('week', this)">Tuần</button>
          <button class="lb-tab" onclick="switchLeaderboardTab('month', this)">Tháng</button>
          <button class="lb-tab" onclick="switchLeaderboardTab('all', this)">Tổng</button>
        </div>
        <div id="leaderboard-container">
          <div class="lb-empty"><span>📊</span><p>Đang tải...</p></div>
        </div>
      </div>
    </div>

  </div>

  <!-- ========== FIREBASE SDK ========== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- App JS -->
  <script src="js/firebase-init.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/presence.js"></script>
  <script src="js/session-storage.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/study-rooms.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/navbar.js"></script>

  <script>
    // ── Trạng thái trang ──
    let _currentRoomId = null;
    let _unsubRoom     = null;
    let _unsubRooms    = null;

    // ── Khởi tạo ──
    initAuthListener({
      requireAuth: true,
      onAuthReady: async (user) => {
        if (!user) return;
        initNavbar();
        await _loadCommunityData();
      }
    });

    async function _loadCommunityData() {
      // Tải phòng học realtime
      _unsubRooms = listenActiveRooms(_renderRoomList);

      // Tải bạn bè
      _loadFriendsList();

      // Tải lời mời kết bạn
      _loadFriendRequests();

      // Tải leaderboard
      _loadLeaderboard("week");
    }

    // ── PHÒNG HỌC ──
    function _renderRoomList(rooms) {
      const container = document.getElementById("room-list");
      if (!container) return;

      if (rooms.length === 0) {
        container.innerHTML = '<div style="color:var(--text-secondary);font-size:0.8rem;padding:0.5rem;">Chưa có phòng nào</div>';
        return;
      }

      container.innerHTML = rooms.map(room => `
        <div class="room-item ${room.id === _currentRoomId ? 'active' : ''}"
             onclick="enterRoom('${room.id}', '${room.name.replace(/'/g, "\\'")}')">
          <span class="room-icon">📖</span>
          <span class="room-name">${room.name}</span>
          <span class="room-count">${(room.members || []).length}/${room.maxMembers}</span>
        </div>
      `).join("");
    }

    async function enterRoom(roomId, roomName) {
      // Rời phòng cũ
      if (_currentRoomId) {
        stopListeningMessages();
        if (_unsubRoom) _unsubRoom();
      }

      _currentRoomId = roomId;

      // Join room
      await joinStudyRoom(roomId);

      // Hiện chat UI
      document.getElementById("welcome-chat").style.display = "none";
      const chatUI = document.getElementById("chat-ui");
      chatUI.style.display = "flex";

      document.getElementById("chat-current-room-name").textContent = roomName;
      document.getElementById("chat-messages").innerHTML = "";

      // Lắng nghe tin nhắn
      const msgContainer = document.getElementById("chat-messages");
      listenMessages(roomId, (msg) => renderMessage(msg, msgContainer));

      // Setup input
      setupChatInput(roomId,
        document.getElementById("chat-input"),
        document.getElementById("btn-chat-send")
      );

      // Lắng nghe thành viên
      document.getElementById("room-members-section").style.display = "block";
      _unsubRoom = listenRoomChanges(roomId, (roomData) => {
        document.getElementById("chat-current-room-info").textContent =
          `${(roomData.members || []).length} thành viên`;
        _renderRoomMembers(roomData);
      });

      // Lắng nghe typing
      listenTyping(roomId, (users) => {
        const el = document.getElementById("chat-typing");
        if (el) {
          el.textContent = users.length > 0
            ? users.map(u => u.name).join(", ") + " đang gõ..."
            : "";
        }
      });

      // Typing indicator khi gõ
      const input = document.getElementById("chat-input");
      let typingTimeout = null;
      input.addEventListener("input", () => {
        setTyping(roomId, true);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => setTyping(roomId, false), 2000);
      });

      // Re-render room list
      if (_unsubRooms) {} // Already listening
    }

    function _renderRoomMembers(roomData) {
      const container = document.getElementById("room-members-list");
      if (!container || !roomData.memberNames) return;

      container.innerHTML = Object.entries(roomData.memberNames).map(([uid, name]) => `
        <div class="member-item">
          <div class="member-avatar-placeholder">${(name || "U")[0]}</div>
          <div class="member-info">
            <div class="member-name">${name}${uid === currentUser?.uid ? ' (bạn)' : ''}</div>
          </div>
          <div class="status-indicator online"></div>
        </div>
      `).join("");
    }

    async function handleLeaveRoom() {
      if (!_currentRoomId) return;
      await leaveStudyRoom(_currentRoomId);
      stopListeningMessages();
      if (_unsubRoom) _unsubRoom();
      _currentRoomId = null;

      document.getElementById("chat-ui").style.display = "none";
      document.getElementById("welcome-chat").style.display = "flex";
      document.getElementById("room-members-section").style.display = "none";
    }

    function openCreateRoomModal() {
      document.getElementById("modal-create-room").classList.remove("hidden");
    }
    function closeCreateRoomModal() {
      document.getElementById("modal-create-room").classList.add("hidden");
    }

    async function handleCreateRoom(e) {
      e.preventDefault();
      const name = document.getElementById("room-name-input").value.trim();
      const max  = parseInt(document.getElementById("room-max-input").value) || 10;
      if (!name) return;

      const roomId = await createStudyRoom(name, max);
      closeCreateRoomModal();
      if (roomId) enterRoom(roomId, name);
    }

    // ── BẠN BÈ ──
    async function _loadFriendsList() {
      if (!currentUser) return;
      const friends = await getFriendsList(currentUser.uid);
      const container = document.getElementById("friends-list");
      if (!container) return;

      if (friends.length === 0) {
        container.innerHTML = '<div style="color:var(--text-secondary);font-size:0.8rem;padding:0.5rem;">Chưa có bạn bè. Tìm và kết bạn bên dưới!</div>';
        return;
      }

      container.innerHTML = friends.map(f => {
        const d = f.friendData || {};
        return `
          <div class="member-item">
            ${d.avatarUrl
              ? `<img src="${d.avatarUrl}" class="member-avatar" alt=""/>`
              : `<div class="member-avatar-placeholder">${(d.displayName || "U")[0]}</div>`}
            <div class="member-info">
              <div class="member-name">${d.displayName || "User"}</div>
              <div class="member-status">${_statusLabel(d.status)}</div>
            </div>
            <div class="status-indicator ${d.status || 'offline'}"></div>
          </div>`;
      }).join("");
    }

    function _statusLabel(s) {
      return s === "online" ? "Trực tuyến"
           : s === "studying" ? "Đang học 📖"
           : "Ngoại tuyến";
    }

    async function _loadFriendRequests() {
      if (!currentUser) return;
      const requests = await getPendingRequests(currentUser.uid);
      const section   = document.getElementById("friend-requests-section");
      const container = document.getElementById("friend-requests-list");
      if (!container || !section) return;

      if (requests.length === 0) {
        section.style.display = "none";
        return;
      }

      section.style.display = "block";
      container.innerHTML = requests.map(r => `
        <div class="friend-request">
          <span class="fr-name">${r.senderData.displayName || "User"}</span>
          <div class="fr-actions">
            <button class="fr-btn accept" onclick="handleAcceptFriend('${r.friendshipId}')">✅</button>
            <button class="fr-btn reject" onclick="handleRejectFriend('${r.friendshipId}')">❌</button>
          </div>
        </div>
      `).join("");
    }

    async function handleAcceptFriend(id) {
      await acceptFriendRequest(id);
      _loadFriendRequests();
      _loadFriendsList();
    }
    async function handleRejectFriend(id) {
      await rejectFriendRequest(id);
      _loadFriendRequests();
    }

    // ── TÌM KIẾM ──
    let _searchDebounce = null;
    async function handleUserSearch(query) {
      clearTimeout(_searchDebounce);
      _searchDebounce = setTimeout(async () => {
        const container = document.getElementById("user-search-results");
        if (!container) return;

        if (query.length < 2) {
          container.innerHTML = "";
          return;
        }

        const users = await searchUsers(query);
        container.innerHTML = users.map(u => `
          <div class="member-item" style="cursor:pointer;">
            ${u.avatarUrl
              ? `<img src="${u.avatarUrl}" class="member-avatar" alt=""/>`
              : `<div class="member-avatar-placeholder">${(u.displayName || "U")[0]}</div>`}
            <div class="member-info">
              <div class="member-name">${u.displayName}</div>
            </div>
            <button class="fr-btn accept" onclick="handleAddFriend('${u.uid}', this)">➕</button>
          </div>
        `).join("");
      }, 400);
    }

    async function handleAddFriend(uid, btn) {
      const result = await sendFriendRequest(uid);
      if (btn) {
        if (result === "sent") { btn.textContent = "✅ Đã gửi"; btn.disabled = true; }
        else if (result === "existing") { btn.textContent = "✓ Đã có"; btn.disabled = true; }
      }
    }

    // ── LEADERBOARD ──
    async function _loadLeaderboard(period) {
      const data = await getLeaderboard(period);
      const container = document.getElementById("leaderboard-container");
      renderLeaderboard(data, container, currentUser?.uid);
    }

    function switchLeaderboardTab(period, btn) {
      document.querySelectorAll(".lb-tab").forEach(t => t.classList.remove("active"));
      if (btn) btn.classList.add("active");
      _loadLeaderboard(period);
    }
  </script>
</body>
</html>
