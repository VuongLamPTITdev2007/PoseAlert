<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PoseAlert — Đăng nhập</title>
  <meta name="description" content="Đăng nhập vào PoseAlert — ứng dụng cảnh báo tư thế ngồi học thông minh với AI" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/scrollbar.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <span class="logo-icon">🧘</span>
        <span class="logo-text">Pose<span class="accent">Alert</span></span>
        <span class="tagline">Cảnh báo tư thế ngồi học thông minh</span>
      </div>

      <!-- Tabs: Đăng nhập / Đăng ký -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">🔑 Đăng nhập</button>
        <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">✨ Đăng ký</button>
      </div>

      <!-- Error message -->
      <div class="auth-error hidden" id="auth-error"></div>

      <!-- Loading -->
      <div class="auth-loading" id="auth-loading">
        <div class="spinner"></div>
        <div>Đang xử lý...</div>
      </div>

      <!-- ===== FORM ĐĂNG NHẬP ===== -->
      <form class="auth-form" id="form-login" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label for="login-email">📧 Email</label>
          <input type="email" id="login-email" placeholder="email@example.com" required autocomplete="email"/>
        </div>
        <div class="input-group">
          <label for="login-password">🔒 Mật khẩu</label>
          <input type="password" id="login-password" placeholder="Nhập mật khẩu" required minlength="6" autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn-auth btn-auth-primary">🔑 Đăng nhập</button>
      </form>

      <!-- ===== FORM ĐĂNG KÝ ===== -->
      <form class="auth-form hidden" id="form-signup" onsubmit="handleSignup(event)">
        <div class="input-group">
          <label for="signup-name">👤 Tên hiển thị</label>
          <input type="text" id="signup-name" placeholder="Tên của bạn" required minlength="2" autocomplete="name"/>
        </div>
        <div class="input-group">
          <label for="signup-email">📧 Email</label>
          <input type="email" id="signup-email" placeholder="email@example.com" required autocomplete="email"/>
        </div>
        <div class="input-group">
          <label for="signup-password">🔒 Mật khẩu</label>
          <input type="password" id="signup-password" placeholder="Tối thiểu 6 ký tự" required minlength="6" autocomplete="new-password"/>
        </div>
        <button type="submit" class="btn-auth btn-auth-primary">✨ Tạo tài khoản</button>
      </form>

      <!-- Divider -->
      <div class="auth-divider">hoặc</div>

      <!-- Google Sign In -->
      <button class="btn-google" onclick="handleGoogleLogin()">
        <span class="google-icon">🌐</span>
        Đăng nhập bằng Google
      </button>

    </div>
  </div>

  <!-- ========== FIREBASE SDK (compat) ========== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- App JS -->
  <script src="js/firebase-init.js"></script>
  <script src="js/auth.js"></script>

  <script>
    // ── Tab switching ──
    function switchAuthTab(tab) {
      const loginForm  = document.getElementById("form-login");
      const signupForm = document.getElementById("form-signup");
      const tabLogin   = document.getElementById("tab-login");
      const tabSignup  = document.getElementById("tab-signup");
      const errorEl    = document.getElementById("auth-error");

      if (errorEl) errorEl.classList.add("hidden");

      if (tab === "login") {
        loginForm.classList.remove("hidden");
        signupForm.classList.add("hidden");
        tabLogin.classList.add("active");
        tabSignup.classList.remove("active");
      } else {
        loginForm.classList.add("hidden");
        signupForm.classList.remove("hidden");
        tabLogin.classList.remove("active");
        tabSignup.classList.add("active");
      }
    }

    // ── Form handlers ──
    async function handleLogin(e) {
      e.preventDefault();
      _setLoading(true);
      try {
        const email = document.getElementById("login-email").value.trim();
        const pass  = document.getElementById("login-password").value;
        await signInWithEmail(email, pass);
        window.location.href = "index.html";
      } catch (err) {
        // Error đã xử lý trong _showAuthError
      } finally {
        _setLoading(false);
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      _setLoading(true);
      try {
        const name  = document.getElementById("signup-name").value.trim();
        const email = document.getElementById("signup-email").value.trim();
        const pass  = document.getElementById("signup-password").value;
        await signUpWithEmail(email, pass, name);
        window.location.href = "index.html";
      } catch (err) {
        // Error đã xử lý trong _showAuthError
      } finally {
        _setLoading(false);
      }
    }

    async function handleGoogleLogin() {
      _setLoading(true);
      try {
        await signInWithGoogle();
        window.location.href = "index.html";
      } catch (err) {
        // Error đã xử lý
      } finally {
        _setLoading(false);
      }
    }

    function _setLoading(on) {
      const el = document.getElementById("auth-loading");
      if (el) el.classList.toggle("active", on);
    }

    // ── Auto-redirect nếu đã đăng nhập ──
    initAuthListener({
      requireAuth: false,
      onAuthReady: (user) => {
        if (user) window.location.href = "index.html";
      }
    });
  </script>
</body>
</html>
